name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable-2026-05-28
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - run: pnpm version:check
      - run: pnpm check
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  windows-build:
    needs: quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable-2026-05-28
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - name: Build Windows x64 bundles
        run: pnpm tauri build --target x86_64-pc-windows-msvc --bundles msi,nsis
      - name: Assemble complete Release directory
        shell: pwsh
        run: ./scripts/package-windows-release.ps1
      - name: Verify Release deliverables
        shell: pwsh
        run: |
          $required = @("*.msi", "*-Setup.exe", "*-x64.exe", "SHA256SUMS.txt", "使用说明.txt")
          foreach ($pattern in $required) {
            if (-not (Get-ChildItem Release -Recurse -File -Filter $pattern)) {
              throw "Release 目录缺少产物：$pattern"
            }
          }
      - name: Upload complete Windows Release
        uses: actions/upload-artifact@v4
        with:
          name: shanji-windows-x64-Release
          if-no-files-found: error
          path: Release
